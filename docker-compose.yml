version: '3.8'

services:
  y-comm-server:
    build: .
    container_name: y-comm-websocket-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - y-comm-network

  # Optionnel: Nginx reverse proxy pour la production
  nginx:
    image: nginx:alpine
    container_name: y-comm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - y-comm-server
    restart: unless-stopped
    networks:
      - y-comm-network
    profiles:
      - production

networks:
  y-comm-network:
    driver: bridge
